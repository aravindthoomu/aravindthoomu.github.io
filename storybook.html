<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storybook</title>

  <!-- Flipbook CSS -->

  <link rel="stylesheet" href="assets/css/df/dflip.min.css">

  <!-- jQuery -->

  <script src="assets/js/libs/jquery.min.js"></script>

  <!-- Flipbook JS -->

  <script src="assets/js/dflip.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b3d2e;
      overflow: hidden;
    }

    .top-bar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 50px;
      background: rgba(0,0,0,0.6);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }

    .review-btn {
      background: #2ecc71;
      color: #0b3d2e;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
    }

    .book-container {
      position: absolute;
      top: 50px;
      width: 100%;
      height: calc(100% - 50px);
    }
  </style>

</head>

<body>

  <div class="top-bar">
    <span>📖 Enjoy the story</span>
    <a href="YOUR_AMAZON_LINK" target="_blank" class="review-btn">⭐ Review</a>
  </div>

  <div class="book-container">
    <div class="_df_book" source="assets/books/storybook.pdf"></div>
  </div>

</body>
</html>
