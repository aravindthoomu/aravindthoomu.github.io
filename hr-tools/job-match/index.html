<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Match Engine</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #172033;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .page {
      width: 100%;
      max-width: 560px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 34px;
      line-height: 1.15;
      font-weight: 700;
      color: #101827;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.6;
      color: #5d687a;
      max-width: 480px;
      margin: 0 auto;
    }

    .form-card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(23, 32, 51, 0.1);
      padding: 32px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #263247;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid #d7deea;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      width: 100%;
      min-height: 50px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1e4fd6;
    }

    .success-message {
      display: none;
      margin-top: 16px;
      color: green;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="page">

    <header>
      <h1>AI Job Match Engine</h1>
      <p class="subtitle">
        Get relevant job opportunities without searching across multiple platforms.
      </p>
    </header>

    <div class="form-card">

      <form onsubmit="handleSubmit(event)">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" required>
        </div>

        <div class="form-group">
          <label>Desired Role</label>
          <input type="text" required>
        </div>

        <div class="form-group">
          <label>Experience (years)</label>
          <input type="number" required>
        </div>

        <div class="form-group">
          <label>Preferred Location</label>
          <input type="text" required>
        </div>

        <div class="form-group">
          <label>Resume Link (optional)</label>
          <input type="text" placeholder="Paste Google Drive link">
        </div>

        <button type="submit">Find My Jobs</button>

        <div class="success-message" id="successMsg">
          Details submitted successfully!
        </div>

      </form>

    </div>

  </div>

  <script>
    function handleSubmit(event) {
      event.preventDefault();
      document.getElementById("successMsg").style.display = "block";
    }
  </script>

</body>
</html>
