<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Tools</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #18212f;
      background:
        radial-gradient(circle at 8% 8%, rgba(66, 107, 148, 0.12), transparent 32rem),
        linear-gradient(180deg, #f7f9fb 0%, #ffffff 48%, #f4f7f8 100%);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(280px, 0.48fr);
      gap: 48px;
      align-items: end;
      padding: 104px 0 64px;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: #526276;
      font-size: 0.78rem;
      font-weight: 740;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      max-width: 760px;
      margin-bottom: 18px;
      color: #111923;
      font-size: clamp(3.4rem, 8vw, 6.8rem);
      font-weight: 760;
      letter-spacing: 0;
      line-height: 0.94;
    }

    .subtitle {
      max-width: 680px;
      margin-bottom: 16px;
      color: #344456;
      font-size: clamp(1.22rem, 2vw, 1.58rem);
      font-weight: 540;
      line-height: 1.42;
    }

    .supporting-line {
      max-width: 660px;
      margin-bottom: 0;
      color: #647184;
      font-size: 1.02rem;
    }

    .suite-note {
      padding: 26px;
      border: 1px solid rgba(128, 145, 165, 0.20);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 18px 58px rgba(37, 53, 75, 0.08);
    }

    .suite-note strong {
      display: block;
      margin-bottom: 8px;
      color: #172231;
      font-size: 1.02rem;
    }

      margin-bottom: 0;
